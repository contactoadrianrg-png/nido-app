<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Crear cuenta - Mi Familia</title>
  <style>
    :root {
      --primary: #7C4DFF;
      --primary-dark: #6839f5;
      --bg: #FFFFFF;
      --gray-light: #F5F5F5;
      --text: #1A1A2E;
      --text-muted: #9E9E9E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 48px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── LOGO ── */
    .logo-section {
      text-align: center;
      padding: 52px 0 32px;
    }
    .logo-emoji {
      font-size: 64px;
      line-height: 1;
      display: block;
      margin-bottom: 12px;
    }
    .logo-name {
      font-size: 30px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── FORM ── */
    .form-wrap { width: 100%; max-width: 400px; }

    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    input {
      width: 100%;
      padding: 16px 24px;
      border-radius: 50px;
      border: 2px solid transparent;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      background: var(--gray-light);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124,77,255,0.12);
    }
    input::placeholder { color: #C0C0C0; font-weight: 400; }

    .hint {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 6px;
      padding-left: 12px;
    }

    .btn-submit {
      width: 100%;
      padding: 17px;
      border-radius: 50px;
      border: none;
      font-size: 17px;
      font-weight: 700;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 22px rgba(124,77,255,0.42);
      font-family: inherit;
      letter-spacing: -0.1px;
      margin-top: 6px;
    }
    .btn-submit:hover  { background: var(--primary-dark); box-shadow: 0 8px 28px rgba(124,77,255,0.52); transform: translateY(-1px); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .error-msg {
      color: #c0392b;
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
      text-align: center;
      display: none;
      background: #fee2e2;
      border-radius: 12px;
      padding: 12px 16px;
    }

    .divider {
      text-align: center;
      margin-top: 28px;
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .divider a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }
    .divider a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="logo-section">
    <span class="logo-emoji">🏠</span>
    <div class="logo-name">Mi Familia</div>
    <div class="logo-sub">Crea tu cuenta gratuita</div>
  </div>

  <div class="form-wrap">
    <form id="registerForm" autocomplete="off">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input type="text" id="name" placeholder="Familia García" required maxlength="60" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
        <div class="hint">Mínimo 6 caracteres</div>
      </div>
      <div class="form-group">
        <label for="password2">Repite la contraseña</label>
        <input type="password" id="password2" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Crear cuenta</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="divider">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></div>
  </div>

  <script>
    if (localStorage.getItem('mf_token')) window.location.replace('/app');

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn  = document.getElementById('submitBtn');
      const err  = document.getElementById('errorMsg');
      err.style.display = 'none';

      const name      = document.getElementById('name').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (password !== password2) {
        err.textContent = 'Las contraseñas no coinciden';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al crear la cuenta');
        localStorage.setItem('mf_token', data.token);
        localStorage.setItem('mf_user',  JSON.stringify(data.user));
        window.location.replace('/app');
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
