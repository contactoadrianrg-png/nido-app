<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Nido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── STICKY HEADER GROUP ── -->
  <div class="sticky-header-group">
    <header class="header">
      <div class="header-top">
        <button class="hamburger-btn" id="hamburgerBtn" title="Menú">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <button class="header-logout-btn" id="logoutBtn" title="Cerrar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="header-greeting" id="headerGreeting">Cargando...</div>
      <div class="header-date" id="headerDate"></div>
      <div class="header-avatars" id="headerAvatars"></div>
    </header>
    <div class="next-event-bar" id="nextEventBar" style="display:none"></div>
  </div>

  <!-- ── SIDE DRAWER ── -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <div class="side-drawer" id="sideDrawer">
    <div class="drawer-header">
      <span class="drawer-title">Filtrar</span>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div id="drawerCatList"></div>
  </div>

  <!-- ── MAIN ── -->
  <main class="main" id="main">

    <!-- VISTA: PRÓXIMOS -->
    <section id="viewUpcoming" class="view active">
      <div class="today-banner" id="todayBanner" style="display:none"></div>
      <div class="active-filter-bar" id="activeFilterBar" style="display:none"></div>
      <div class="chip-row" id="upcomingChildFilter" style="display:none"></div>
      <div id="upcomingCatFilter" style="display:none">
        <button class="chip chip-cat active" data-cat=""></button>
        <button class="chip chip-cat" data-cat="medica"></button>
        <button class="chip chip-cat" data-cat="examen"></button>
        <button class="chip chip-cat" data-cat="excursion"></button>
        <button class="chip chip-cat" data-cat="deporte"></button>
        <button class="chip chip-cat" data-cat="colegio"></button>
        <button class="chip chip-cat" data-cat="otro"></button>
      </div>
      <div class="events-container" id="upcomingList"></div>
    </section>

    <!-- VISTA: HISTORIAL -->
    <section id="viewHistory" class="view">
      <div class="chip-row" id="historyChildFilter" style="display:none"></div>
      <select id="historyCatFilter" style="display:none">
        <option value="">Todas las categorías</option>
        <option value="medica">🏥 Médica</option>
        <option value="examen">📝 Examen</option>
        <option value="excursion">🎒 Excursión</option>
        <option value="deporte">⚽ Deporte</option>
        <option value="colegio">🏫 Colegio</option>
        <option value="otro">📌 Otro</option>
      </select>
      <div class="events-container" id="historyList"></div>
    </section>

    <!-- VISTA: ESTADÍSTICAS -->
    <section id="viewStats" class="view">
      <div id="statsContent"></div>
    </section>

    <!-- VISTA: CONFIGURACIÓN -->
    <section id="viewSettings" class="view">
      <div id="settingsContent"></div>
    </section>

  </main>

  <!-- ── FAB ── -->
  <button class="fab" id="fabBtn" title="Añadir evento">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav">
    <div class="nav-pill-indicator" id="navPill"></div>
    <button class="nav-item active" data-view="upcoming">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="nav-label">Próximos</span>
    </button>
    <button class="nav-item" data-view="history">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="nav-label">Historial</span>
    </button>
    <button class="nav-item" data-view="stats">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span class="nav-label">Stats</span>
    </button>
    <button class="nav-item" data-view="settings">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span class="nav-label">Config</span>
    </button>
  </nav>

  <!-- ── CHILD PROFILE OVERLAY ── -->
  <div class="profile-overlay" id="profileOverlay">
    <div id="profileContent"></div>
  </div>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="eventModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="modalTitle">Nuevo evento</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <form id="eventForm" autocomplete="off">
          <input type="hidden" id="eventId">

          <div class="form-group">
            <label class="form-label">¿Para quién?</label>
            <div class="child-selector" id="childSelector"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Actividad</label>
            <input class="form-input" type="text" id="eventTitle" placeholder="¿Qué actividad?" required maxlength="100">
          </div>

          <div class="form-group">
            <label class="form-label">Categoría</label>
            <div class="category-grid" id="categorySelector"></div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Fecha</label>
              <input class="form-input" type="date" id="eventDate" required>
            </div>
            <div class="form-group">
              <label class="form-label">Hora <span class="optional">(opcional)</span></label>
              <input class="form-input" type="time" id="eventTime">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Notas <span class="optional">(opcional)</span></label>
            <textarea class="form-input form-textarea" id="eventNotes" placeholder="Información adicional..." rows="3" maxlength="500"></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-danger" id="deleteEventBtn" style="display:none">🗑️ Eliminar</button>
            <button type="submit" class="btn btn-primary" id="saveEventBtn">✓ Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
