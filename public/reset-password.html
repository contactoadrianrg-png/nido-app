<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - Mi Familia</title>
  <style>
    :root { --primary: #6C63FF; --primary-dark: #5a52d5; --bg: #f0f2ff; --card: #fff; --text: #1a1d2e; --text-muted: #6b7280; --border: #e5e7eb; --radius: 18px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: linear-gradient(135deg, #6C63FF 0%, #8b5cf6 60%, #a855f7 100%); padding: 32px 24px 48px; text-align: center; color: #fff; }
    .header-icon { font-size: 48px; margin-bottom: 8px; }
    .header h1 { font-size: 22px; font-weight: 800; }
    .header p { opacity: 0.85; font-size: 14px; margin-top: 4px; }
    .card-wrap { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 0 16px 32px; margin-top: -24px; }
    .card { background: var(--card); border-radius: var(--radius); box-shadow: 0 4px 32px rgba(108,99,255,0.15); padding: 32px 28px; width: 100%; max-width: 420px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 16px; color: var(--text); background: #fafafa; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--primary); background: #fff; }
    .btn { width: 100%; padding: 14px; border-radius: 32px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 12px; text-align: center; display: none; }
    .msg.error { color: #e53e3e; }
    .msg.success { color: #16a34a; }
    .back { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
    .link { color: var(--primary); text-decoration: none; font-weight: 600; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🔑</div>
    <h1>Recuperar contraseña</h1>
    <p id="headerSub">Te enviaremos un enlace por email</p>
  </div>

  <div class="card-wrap">
    <div class="card">

      <!-- Formulario solicitud de reset -->
      <div id="requestForm">
        <form id="forgotForm">
          <div class="form-group">
            <label for="email">Email de tu cuenta</label>
            <input type="email" id="email" placeholder="tu@email.com" required>
          </div>
          <button type="submit" class="btn btn-primary" id="forgotBtn">Enviar enlace</button>
          <div class="msg" id="forgotMsg"></div>
        </form>
        <div class="back">
          <a href="/login" class="link">Volver al inicio de sesión</a>
        </div>
      </div>

      <!-- Formulario nueva contraseña (cuando viene con ?token=) -->
      <div id="resetForm" style="display:none">
        <form id="newPassForm">
          <div class="form-group">
            <label for="newPass">Nueva contraseña</label>
            <input type="password" id="newPass" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
          <div class="form-group">
            <label for="newPass2">Repite la contraseña</label>
            <input type="password" id="newPass2" placeholder="••••••" required>
          </div>
          <button type="submit" class="btn btn-primary" id="resetBtn">Cambiar contraseña</button>
          <div class="msg" id="resetMsg"></div>
        </form>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get('token');

    if (resetToken) {
      document.getElementById('requestForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
      document.getElementById('headerSub').textContent = 'Elige tu nueva contraseña';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      const msg = document.getElementById('forgotMsg');
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      msg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        msg.textContent = 'Si ese email está registrado, recibirás el enlace en breve. (Sin SMTP configurado, revisa la consola del servidor.)';
        msg.className = 'msg success';
        msg.style.display = 'block';
        btn.textContent = 'Enviado';
      } catch (ex) {
        msg.textContent = 'Error. Inténtalo de nuevo.';
        msg.className = 'msg error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Enviar enlace';
      }
    });

    document.getElementById('newPassForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn  = document.getElementById('resetBtn');
      const msg  = document.getElementById('resetMsg');
      const pass = document.getElementById('newPass').value;
      const pass2 = document.getElementById('newPass2').value;
      msg.style.display = 'none';

      if (pass !== pass2) {
        msg.textContent = 'Las contraseñas no coinciden';
        msg.className = 'msg error';
        msg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Cambiando...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, password: pass }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        msg.textContent = '¡Contraseña cambiada! Redirigiendo...';
        msg.className = 'msg success';
        msg.style.display = 'block';
        setTimeout(() => window.location.replace('/login'), 2000);
      } catch (ex) {
        msg.textContent = ex.message || 'Enlace inválido o expirado';
        msg.className = 'msg error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Cambiar contraseña';
      }
    });
  </script>
</body>
</html>
