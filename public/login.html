<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Entrar - Nido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:      #6B9E8F;
      --primary-dark: #5A8A7A;
      --accent:       #E8877A;
      --bg:           #FAF7F2;
      --text:         #2D4A3E;
      --text-muted:   #8BA89E;
      --border:       #E2EBE8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 48px;
      max-width: 480px;
      margin: 0 auto;
    }

    .logo-section {
      text-align: center;
      padding: 56px 0 36px;
    }
    .logo-bird {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    .logo-name {
      font-size: 36px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: -0.8px;
    }
    .logo-sub {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .form-wrap { width: 100%; max-width: 400px; }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    input {
      width: 100%;
      padding: 16px 24px;
      border-radius: 50px;
      border: 2px solid var(--border);
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(107,158,143,0.14);
    }
    input::placeholder { color: #B0C4BE; font-weight: 500; }

    .forgot {
      text-align: right;
      margin: 8px 4px 22px;
    }
    .forgot a {
      font-size: 14px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: 17px;
      border-radius: 50px;
      border: none;
      font-size: 17px;
      font-weight: 800;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 22px rgba(107,158,143,0.44);
      font-family: inherit;
      letter-spacing: -0.1px;
    }
    .btn-submit:hover  { background: var(--primary-dark); box-shadow: 0 8px 28px rgba(107,158,143,0.54); transform: translateY(-1px); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .error-msg {
      color: #A04035;
      font-size: 14px;
      font-weight: 700;
      margin-top: 16px;
      text-align: center;
      display: none;
      background: #FDECEA;
      border-radius: 14px;
      padding: 12px 16px;
    }

    .divider {
      text-align: center;
      margin-top: 28px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .divider a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 800;
    }
    .divider a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="logo-section">
    <div class="logo-bird">
      <svg width="80" height="72" viewBox="0 0 80 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 68 Q40 54 72 68" stroke="#A07850" stroke-width="3" stroke-linecap="round"/>
        <path d="M12 62 Q40 48 68 62" stroke="#B89060" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M16 56 Q40 42 64 56" stroke="#C9A872" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="34" cy="59" rx="7" ry="5.5" fill="#EDD9BA"/>
        <ellipse cx="47" cy="60" rx="7" ry="5.5" fill="#E8D5B7"/>
        <path d="M20 34 Q8 44 6 40 Q14 38 20 34Z" fill="#5A8A7A"/>
        <ellipse cx="34" cy="28" rx="15" ry="12" fill="#6B9E8F"/>
        <path d="M22 24 Q30 12 38 24" fill="#5A8A7A"/>
        <circle cx="50" cy="17" r="10" fill="#6B9E8F"/>
        <circle cx="53" cy="14.5" r="3" fill="white"/>
        <circle cx="53.8" cy="14.5" r="1.5" fill="#2D4A3E"/>
        <circle cx="53" cy="13.8" r="0.8" fill="white" opacity="0.8"/>
        <path d="M60 17 L68 18.5 L60 20.5Z" fill="#E8877A"/>
      </svg>
    </div>
    <div class="logo-name">Nido</div>
    <div class="logo-sub">Bienvenido de vuelta</div>
  </div>

  <div class="form-wrap">
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="forgot">
        <a href="/reset-password.html">¿Olvidaste tu contraseña?</a>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Entrar</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="divider">¿No tienes cuenta? <a href="/register">Regístrate gratis</a></div>
  </div>

  <script>
    if (localStorage.getItem('mf_token')) window.location.replace('/app');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');
        localStorage.setItem('mf_token', data.token);
        localStorage.setItem('mf_user',  JSON.stringify(data.user));
        window.location.replace('/app');
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
