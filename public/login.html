<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Iniciar sesión - Mi Familia</title>
  <style>
    :root {
      --primary: #7C4DFF;
      --primary-dark: #6839f5;
      --bg: #FFFFFF;
      --gray-light: #F5F5F5;
      --text: #1A1A2E;
      --text-muted: #9E9E9E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 48px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── LOGO ── */
    .logo-section {
      text-align: center;
      padding: 64px 0 40px;
    }
    .logo-emoji {
      font-size: 72px;
      line-height: 1;
      display: block;
      margin-bottom: 14px;
    }
    .logo-name {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 17px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── FORM ── */
    .form-wrap { width: 100%; max-width: 400px; }

    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    input {
      width: 100%;
      padding: 16px 24px;
      border-radius: 50px;
      border: 2px solid transparent;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      background: var(--gray-light);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124,77,255,0.12);
    }
    input::placeholder { color: #C0C0C0; font-weight: 400; }

    .forgot {
      text-align: right;
      margin: 8px 4px 20px;
    }
    .forgot a {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: 17px;
      border-radius: 50px;
      border: none;
      font-size: 17px;
      font-weight: 700;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 22px rgba(124,77,255,0.42);
      font-family: inherit;
      letter-spacing: -0.1px;
    }
    .btn-submit:hover  { background: var(--primary-dark); box-shadow: 0 8px 28px rgba(124,77,255,0.52); transform: translateY(-1px); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .error-msg {
      color: #c0392b;
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
      text-align: center;
      display: none;
      background: #fee2e2;
      border-radius: 12px;
      padding: 12px 16px;
    }

    .divider {
      text-align: center;
      margin-top: 28px;
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .divider a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }
    .divider a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="logo-section">
    <span class="logo-emoji">🏠</span>
    <div class="logo-name">Mi Familia</div>
    <div class="logo-sub">Bienvenido de vuelta</div>
  </div>

  <div class="form-wrap">
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="forgot">
        <a href="/reset-password.html">¿Olvidaste tu contraseña?</a>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Entrar</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="divider">¿No tienes cuenta? <a href="/register">Regístrate gratis</a></div>
  </div>

  <script>
    if (localStorage.getItem('mf_token')) window.location.replace('/app');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');
        localStorage.setItem('mf_token', data.token);
        localStorage.setItem('mf_user',  JSON.stringify(data.user));
        window.location.replace('/app');
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
