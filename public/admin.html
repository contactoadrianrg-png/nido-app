<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Mi Familia</title>
  <style>
    :root { --primary: #6C63FF; --primary-dark: #5a52d5; --bg: #f0f2ff; --card: #fff; --text: #1a1d2e; --text-muted: #6b7280; --border: #e5e7eb; --radius: 14px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: linear-gradient(135deg, #6C63FF 0%, #8b5cf6 60%, #a855f7 100%); padding: 24px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
    .header-left h1 { font-size: 20px; font-weight: 800; }
    .header-left p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
    .btn { padding: 8px 18px; border-radius: 24px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .btn-ghost { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.4); }
    .btn-ghost:hover { background: rgba(255,255,255,0.3); }
    .content { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: var(--card); border-radius: var(--radius); padding: 20px 24px; flex: 1; min-width: 140px; box-shadow: 0 2px 12px rgba(108,99,255,0.08); }
    .stat-num { font-size: 32px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .table-wrap { background: var(--card); border-radius: var(--radius); box-shadow: 0 2px 12px rgba(108,99,255,0.08); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f7ff; text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-admin { background: #ede9ff; color: var(--primary); }
    .badge-user { background: #f3f4f6; color: var(--text-muted); }
    .empty { text-align: center; padding: 48px; color: var(--text-muted); }
    .loader { text-align: center; padding: 48px; color: var(--text-muted); }
    .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 20px; text-align: center; color: #b91c1c; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>🏠 Panel de Administración</h1>
      <p>Mi Familia</p>
    </div>
    <div style="display:flex;gap:8px">
      <a href="/app" class="btn btn-ghost">← Ir a la app</a>
      <button class="btn btn-ghost" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="content">
    <div class="stats-row" id="statsRow">
      <div class="loader">Cargando...</div>
    </div>

    <div class="section-title">Usuarios registrados</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Hijos</th>
            <th>Eventos</th>
            <th>Registro</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="7" class="loader">Cargando usuarios...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('mf_token');
    const user  = JSON.parse(localStorage.getItem('mf_user') || '{}');

    if (!token) { window.location.replace('/login'); }
    if (!user.is_admin) { window.location.replace('/app'); }

    function logout() {
      localStorage.removeItem('mf_token');
      localStorage.removeItem('mf_user');
      window.location.replace('/');
    }

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function formatDate(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users', { headers: authHeaders() });
        if (res.status === 403) {
          document.querySelector('.content').innerHTML = '<div class="error-box">⛔ Acceso denegado. Esta página es solo para administradores.</div>';
          return;
        }
        if (!res.ok) throw new Error('Error cargando usuarios');

        const users = await res.json();

        // Stats
        const totalEvents = users.reduce((s, u) => s + u.events_count, 0);
        document.getElementById('statsRow').innerHTML = `
          <div class="stat-card"><div class="stat-num">${users.length}</div><div class="stat-label">Usuarios</div></div>
          <div class="stat-card"><div class="stat-num">${totalEvents}</div><div class="stat-label">Eventos totales</div></div>
          <div class="stat-card"><div class="stat-num">${users.filter(u => u.is_admin).length}</div><div class="stat-label">Administradores</div></div>
        `;

        // Table
        if (users.length === 0) {
          document.getElementById('usersTable').innerHTML = '<tr><td colspan="7" class="empty">Sin usuarios</td></tr>';
          return;
        }

        document.getElementById('usersTable').innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td><strong>${escHtml(u.name)}</strong></td>
            <td>${escHtml(u.email)}</td>
            <td><span class="badge ${u.is_admin ? 'badge-admin' : 'badge-user'}">${u.is_admin ? '⭐ Admin' : 'Usuario'}</span></td>
            <td>${u.children_count}</td>
            <td>${u.events_count}</td>
            <td>${formatDate(u.created_at)}</td>
          </tr>
        `).join('');

      } catch (err) {
        document.getElementById('usersTable').innerHTML = `<tr><td colspan="7" class="empty">Error: ${err.message}</td></tr>`;
      }
    }

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadUsers();
  </script>
</body>
</html>
